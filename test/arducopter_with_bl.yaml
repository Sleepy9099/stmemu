target:
  svd: cmsis-svd-stm32/stm32h7/STM32H743.svd
  base: 0x08000000
  # AXI SRAM (D1) on H7. ArduCopter MSP=0x24000600.
  sram_base: 0x24000000
  sram_size: 0x80000

emulator:
  # tick_scale=1000. Sounds aggressive but the math holds:
  #   TIM2 prescaler 199 (divider 200) -> CNT advances by tick_scale/200
  #   ticks per instruction. At 1000 -> 5 CNT per instruction.
  #   ChibiOS stSetAlarm writes CCR1=CNT+10 then re-reads CNT. Between
  #   write and read is ~1 instruction (a single LDR), so CNT advances ~5.
  #   The break check "CNT - iVar3 < 10" still holds (5 < 10). The race
  #   only triggers above ~tick_scale=2000 where one instruction's worth
  #   of CNT advance crosses the full alarm window.
  #
  # Boot delay budget at tick_scale=1000: 5s emulated ~= 1M instructions
  # ~= 50 s wall-clock at our throughput.
  tick_scale: 1000
  # Generous stuck thresholds: ArduPilot's Scheduler::delay_microseconds is
  # a tight busy-wait reading TIM2.CNT, which trips the same-PC counter.
  stuck_threshold: 10000000
  interrupt_stuck_threshold: 5000000000
  bus_policy: permissive

board:
  # ── On-board IMU stack (SPI1, distinct CS pins) ────────────────
  #
  # The three IMUs share the SPI1 bus and are selected by GPIO chip-selects
  # the firmware drives. SpiPeripheral dispatches each MOSI byte to the
  # device whose cs_active flag is currently set.
  spi_devices:
    - peripheral: SPI1
      type: icm42688
      name: imu_icm42688
      cs_port: GPIOC
      cs_pin: 13
    - peripheral: SPI1
      type: bmi088_a
      name: imu_bmi088_a
      cs_port: GPIOC
      cs_pin: 15
    - peripheral: SPI1
      type: bmi088_g
      name: imu_bmi088_g
      cs_port: GPIOC
      cs_pin: 14

    # FM25V02A FRAM on SPI2. Only slave on this bus, so dispatch routes
    # all SPI2 bytes to it whether or not a GPIO falling edge has been
    # observed yet.
    - peripheral: SPI2
      type: fm25v02a
      name: storage_fram
      image_file: arducopter_fram.bin

  # ── On-board I2C ──────────────────────────────────────────────
  #
  # ArduPilot "I2C bus 0" maps to STM32 I2C4 on Pixhawk-class H7 boards
  # (PD12 SCL / PD13 SDA). MS5611 baro is strapped at either 0x76 or 0x77
  # depending on the CSB pin; this board has it at both for redundancy.
  i2c_devices:
    - peripheral: I2C4
      devices:
        - type: ms5611
          name: baro_ms5611_76
          address: 0x76
        - type: ms5611
          name: baro_ms5611_77
          address: 0x77

  # ── External UART (GPS on UART5) ──────────────────────────────
  uart_devices:
    - peripheral: UART5
      device: ublox
      name: gps_ublox
      mode: ubx
      lat: 37.7749
      lon: -122.4194
      alt: 30.0

  gpio_levels:
    GPIOA:
      0: low
    GPIOB:
      0: low
